server:
  port: 8084

spring:
  application:
    name: PaiAgent
  devtools:
    restart:
      enabled: true
      additional-paths: src/main/java,src/main/resources
    livereload:
      enabled: true
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2s
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/paiagent?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
  jackson:
    time-zone: GMT+8
    date-format: yyyy-MM-dd HH:mm:ss
  ai:
    openai:
      # 占位配置，实际使用时通过节点配置动态指定
      api-key: ${OPENAI_API_KEY:sk-placeholder}
      base-url: https://api.openai.com

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.paiagent.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# SpringDoc OpenAPI 配置
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
  info:
    title: PaiAgent API
    description: AI Agent 流图执行面板 API 文档
    version: 1.0.0

# MinIO 配置
minio:
  endpoint: http://localhost:9000
  accessKey: minioadmin
  secretKey: minioadmin
  bucketName: paiagent
  publicUrl: http://localhost:9000

# PaiAgent 配置
paiagent:
  auth:
    jwt-secret: paiagent-one-jwt-secret-key-change-me-to-a-long-random-string
    access-token-expiration-minutes: 120
    refresh-token-expiration-hours: 168
  skills:
    path: skills
